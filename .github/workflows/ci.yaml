name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: helmforge/openreel-video:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --rm --name openreel-video-ci -p 8080:8080 helmforge/openreel-video:ci
          trap 'docker stop openreel-video-ci' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8080/ | grep -i openreel

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/openreel-video:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
